<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <title>Enenji </title>
    <style>
        :root {
            --bg-start: #1a1a2e;
            --bg-mid: #16213e;
            --bg-end: #0f0f1a;
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.75);
            --text-tertiary: rgba(255, 255, 255, 0.5);
            --accent: #5B6ABF;
            --accent-glow: rgba(91, 106, 191, 0.4);
            --success: #34C759;
            --danger: #FF3B30;
            --warning: #FF9500;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.2);
            --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.35);
            --shadow-lg: 0 16px 40px rgba(0, 0, 0, 0.45);
            --icon-size: 56px;
            --icon-radius: 15px;
            --icon-gap: 20px;
            --transition-fast: 0.18s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-smooth: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --input-bg: rgba(255, 255, 255, 0.06);
            --input-border: rgba(255, 255, 255, 0.14);
            --input-focus-border: rgba(140, 150, 220, 0.5);
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-hover-bg: rgba(255, 255, 255, 0.09);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #0a0a14;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            padding: 16px;
        }

        .phone-frame {
            position: relative;
            width: 414px;
            min-width: 414px;
            height: 896px;
            background: #0d0d1a;
            border-radius: 44px;
            overflow: hidden;
            box-shadow: 0 0 0 3px #1a1a2e, 0 0 0 6px #111122, 0 0 0 8px #1c1c32, 0 0 0 10px #0a0a16, 0 20px 60px rgba(0, 0, 0, 0.7), 0 0 120px rgba(90, 100, 180, 0.12);
            transition: transform var(--transition-smooth);
        }
        .phone-frame:hover {
            transform: translateY(-4px);
            box-shadow: 0 0 0 3px #1a1a2e, 0 0 0 6px #111122, 0 0 0 8px #1c1c32, 0 0 0 10px #0a0a16, 0 28px 70px rgba(0, 0, 0, 0.75), 0 0 150px rgba(90, 100, 180, 0.18);
        }

        .screen {
            position: absolute;
            top: 12px;
            left: 10px;
            right: 10px;
            bottom: 12px;
            border-radius: 34px;
            overflow: hidden;
            background: linear-gradient(160deg, #1a1a30 0%, #151528 20%, #1c1d38 40%, #141a2e 60%, #0f1525 80%, #1a1a2e 100%);
            display: flex;
            flex-direction: column;
            cursor: default;
        }

        .wallpaper {
            position: absolute;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            border-radius: 34px;
            overflow: hidden;
        }
        .wallpaper-glow {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.55;
            animation: glowFloat 12s ease-in-out infinite;
        }
        .glow-1 {
            width: 260px;
            height: 260px;
            background: radial-gradient(circle, rgba(120, 100, 210, 0.7) 0%, transparent 70%);
            top: -60px;
            left: -40px;
            animation-delay: 0s;
        }
        .glow-2 {
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(220, 130, 100, 0.55) 0%, transparent 70%);
            bottom: 20%;
            right: -50px;
            animation-delay: -5s;
        }
        .glow-3 {
            width: 180px;
            height: 180px;
            background: radial-gradient(circle, rgba(100, 160, 220, 0.5) 0%, transparent 70%);
            top: 40%;
            left: 30%;
            animation-delay: -8s;
        }
        .glow-4 {
            width: 140px;
            height: 140px;
            background: radial-gradient(circle, rgba(200, 120, 160, 0.45) 0%, transparent 70%);
            bottom: 30%;
            left: 10%;
            animation-delay: -3s;
        }
        @keyframes glowFloat {
            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }
            25% {
                transform: translate(30px, -25px) scale(1.08);
            }
            50% {
                transform: translate(-15px, 20px) scale(0.94);
            }
            75% {
                transform: translate(-25px, -10px) scale(1.05);
            }
        }

        .particles {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            border-radius: 34px;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            animation: floatUp 8s ease-in infinite;
            opacity: 0;
        }
        .particle:nth-child(1) {
            left: 10%;
            bottom: -10px;
            animation-delay: 0s;
            animation-duration: 7s;
        }
        .particle:nth-child(2) {
            left: 28%;
            bottom: -10px;
            animation-delay: 2.5s;
            animation-duration: 9s;
        }
        .particle:nth-child(3) {
            left: 46%;
            bottom: -10px;
            animation-delay: 5s;
            animation-duration: 7.5s;
        }
        .particle:nth-child(4) {
            left: 64%;
            bottom: -10px;
            animation-delay: 1.5s;
            animation-duration: 8.5s;
        }
        .particle:nth-child(5) {
            left: 80%;
            bottom: -10px;
            animation-delay: 4s;
            animation-duration: 6.8s;
        }
        .particle:nth-child(6) {
            left: 18%;
            bottom: -10px;
            animation-delay: 6s;
            animation-duration: 9.5s;
        }
        @keyframes floatUp {
            0% {
                transform: translateY(0) translateX(0) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 0.8;
                transform: translateY(-60px) translateX(10px) scale(1.2);
            }
            30% {
                opacity: 0.5;
                transform: translateY(-180px) translateX(-15px) scale(0.8);
            }
            60% {
                opacity: 0.2;
                transform: translateY(-380px) translateX(20px) scale(0.4);
            }
            100% {
                opacity: 0;
                transform: translateY(-650px) translateX(-10px) scale(0);
            }
        }

        .content-layer {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100%;
            padding: 0 20px;
            transition: opacity 0.35s ease, transform 0.35s ease;
        }
        .content-layer.hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.96);
        }

        .status-bar {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 4px 10px 4px;
            z-index: 10;
            flex-shrink: 0;
        }
        .status-left {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            letter-spacing: 0.3px;
        }
        .status-left .time-text {
            font-variant-numeric: tabular-nums;
            font-family: 'SF Pro Display', -apple-system, 'Helvetica Neue', sans-serif;
            font-weight: 590;
            letter-spacing: 0.2px;
        }
        .status-icons {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .signal-bars {
            display: flex;
            align-items: flex-end;
            gap: 1.5px;
            height: 12px;
        }
        .signal-bar {
            width: 3px;
            background: #fff;
            border-radius: 1px;
        }
        .signal-bar:nth-child(1) {
            height: 4px;
        }
        .signal-bar:nth-child(2) {
            height: 6px;
        }
        .signal-bar:nth-child(3) {
            height: 9px;
        }
        .signal-bar:nth-child(4) {
            height: 12px;
        }
        .wifi-icon {
            width: 14px;
            height: 14px;
        }
        .wifi-icon svg {
            width: 14px;
            height: 14px;
            display: block;
        }
        .battery {
            display: flex;
            align-items: center;
            gap: 2px;
        }
        .battery-body {
            width: 24px;
            height: 11px;
            border: 1.5px solid #fff;
            border-radius: 3px;
            padding: 2px;
            display: flex;
            align-items: center;
        }
        .battery-fill {
            width: 75%;
            height: 100%;
            background: #fff;
            border-radius: 1px;
            transition: width 0.5s;
        }
        .battery-cap {
            width: 2.5px;
            height: 5px;
            background: #fff;
            border-radius: 0 1.5px 1.5px 0;
        }

        .time-widget {
            margin-top: 18px;
            flex-shrink: 0;
            background: var(--glass-bg);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border: 1px solid var(--glass-border);
            border-radius: 26px;
            padding: 20px 30px 18px 30px;
            text-align: center;
            box-shadow: var(--shadow-md), inset 0 1px 0 rgba(255, 255, 255, 0.06);
            transition: all var(--transition-smooth);
            cursor: default;
            position: relative;
            overflow: hidden;
        }
        .time-widget:hover {
            box-shadow: var(--shadow-lg), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.25);
        }
        .time-widget:active {
            transform: scale(0.97);
        }
        .time-main {
            font-size: 52px;
            font-weight: 300;
            letter-spacing: 1px;
            color: #fff;
            line-height: 1;
            font-variant-numeric: tabular-nums;
            font-family: 'SF Pro Display', -apple-system, 'Helvetica Neue', 'PingFang SC', sans-serif;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
        }
        .time-colon {
            animation: colonBlink 1s step-end infinite;
            font-weight: 200;
            margin: 0 -2px;
        }
        @keyframes colonBlink {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.25;
            }
        }
        .time-date {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-top: 5px;
            letter-spacing: 0.4px;
        }
        .time-greeting {
            font-size: 11px;
            font-weight: 400;
            color: var(--text-tertiary);
            margin-top: 2px;
        }

        .search-bar {
            margin-top: 22px;
            flex-shrink: 0;
            width: 100%;
            max-width: 280px;
            height: 38px;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 19px;
            display: flex;
            align-items: center;
            padding: 0 14px;
            gap: 8px;
            cursor: pointer;
            transition: all var(--transition-fast);
            box-shadow: var(--shadow-sm);
        }
        .search-bar:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
        }
        .search-bar:active {
            transform: scale(0.96);
            background: rgba(255, 255, 255, 0.13);
        }
        .search-icon {
            width: 15px;
            height: 15px;
            flex-shrink: 0;
            opacity: 0.55;
        }
        .search-text {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.45);
        }

        .app-icons-row {
            margin-top: auto;
            margin-bottom: auto;
            flex-shrink: 0;
            display: flex;
            gap: var(--icon-gap);
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 10px 0;
            flex-wrap: nowrap;
        }
        .app-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: transform var(--transition-fast);
            -webkit-tap-highlight-color: transparent;
            position: relative;
            flex-shrink: 0;
        }
        .app-item:active .app-icon-wrapper {
            transform: scale(0.86);
            transition: transform 0.12s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .app-icon-wrapper {
            width: var(--icon-size);
            height: var(--icon-size);
            border-radius: var(--icon-radius);
            box-shadow: var(--shadow-md), 0 0 0 1px rgba(255, 255, 255, 0.08);
            transition: all var(--transition-fast);
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
        }
        .app-icon-wrapper::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 35%;
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0.22) 0%, rgba(255, 255, 255, 0) 100%);
            border-radius: var(--icon-radius) var(--icon-radius) 0 0;
            pointer-events: none;
            z-index: 3;
        }
        .app-item:hover .app-icon-wrapper {
            box-shadow: var(--shadow-lg), 0 0 0 1px rgba(255, 255, 255, 0.18);
            transform: translateY(-3px);
        }
        .app-icon-inner {
            width: 100%;
            height: 100%;
            border-radius: var(--icon-radius);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 27px;
            transition: filter 0.2s ease;
            position: relative;
            z-index: 2;
        }
        .icon-wechat {
            background: linear-gradient(145deg, #1fcf6b 0%, #06b850 30%, #059a42 100%);
        }
        .icon-api {
            background: linear-gradient(145deg, #7b8cd6 0%, #4a5cb5 30%, #3a4a9e 100%);
        }
        .icon-book {
            background: linear-gradient(145deg, #f0a860 0%, #d87d35 30%, #c06828 100%);
        }
        .icon-beauty {
            background: linear-gradient(145deg, #f07085 0%, #d94a62 30%, #c23850 100%);
        }
        .icon-settings {
            background: linear-gradient(145deg, #9eaab8 0%, #6b7b8d 30%, #4a5b6e 100%);
        }
        .app-label {
            font-size: 11px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.82);
            letter-spacing: 0.3px;
            text-align: center;
            transition: color 0.2s;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.4);
            white-space: nowrap;
        }
        .app-item:hover .app-label {
            color: #fff;
        }
        .badge {
            position: absolute;
            top: -5px;
            right: -5px;
            width: 19px;
            height: 19px;
            background: #ff3b30;
            border-radius: 50%;
            font-size: 10px;
            font-weight: 600;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            box-shadow: 0 2px 6px rgba(255, 59, 48, 0.5);
            animation: badgePulse 2.5s ease-in-out infinite;
        }
        @keyframes badgePulse {
            0%,
            100% {
                box-shadow: 0 2px 6px rgba(255, 59, 48, 0.5);
            }
            50% {
                box-shadow: 0 2px 14px rgba(255, 59, 48, 0.75), 0 0 0 4px rgba(255, 59, 48, 0.15);
            }
        }
        .home-indicator {
            flex-shrink: 0;
            width: 134px;
            height: 5px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 3px;
            margin-bottom: 8px;
            transition: all 0.3s;
            cursor: pointer;
        }
        .home-indicator:hover {
            background: rgba(255, 255, 255, 0.75);
            width: 150px;
        }

        .toast {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(30, 30, 50, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            color: #fff;
            padding: 10px 22px;
            border-radius: 22px;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.3px;
            opacity: 0;
            pointer-events: none;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 30;
            white-space: nowrap;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* API页面 */
        .api-page {
            position: absolute;
            inset: 0;
            z-index: 20;
            display: flex;
            flex-direction: column;
            background: rgba(14, 14, 28, 0.95);
            backdrop-filter: blur(32px);
            -webkit-backdrop-filter: blur(32px);
            border-radius: 34px;
            opacity: 0;
            pointer-events: none;
            transform: translateY(20px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }
        .api-page.active {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
        }
        .api-page::-webkit-scrollbar {
            width: 3px;
        }
        .api-page::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 3px;
        }

        .api-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 18px 12px 18px;
            flex-shrink: 0;
            position: sticky;
            top: 0;
            z-index: 5;
            background: rgba(14, 14, 28, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }
        .api-back-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all var(--transition-fast);
            flex-shrink: 0;
            color: #fff;
        }
        .api-back-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(1.05);
        }
        .api-back-btn:active {
            transform: scale(0.9);
            background: rgba(255, 255, 255, 0.2);
        }
        .api-title {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            letter-spacing: 0.3px;
        }
        .api-status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-left: auto;
            flex-shrink: 0;
            transition: background 0.4s;
        }
        .api-status-dot.idle {
            background: #666;
        }
        .api-status-dot.connected {
            background: var(--success);
            box-shadow: 0 0 8px rgba(52, 199, 89, 0.5);
        }
        .api-status-dot.error {
            background: var(--danger);
            box-shadow: 0 0 8px rgba(255, 59, 48, 0.5);
        }
        .api-status-dot.loading {
            background: var(--warning);
            box-shadow: 0 0 8px rgba(255, 149, 0, 0.5);
            animation: loadingPulse 0.8s ease-in-out infinite;
        }
        @keyframes loadingPulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.35;
            }
        }

        .api-body {
            flex: 1;
            padding: 16px 18px 20px 18px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .provider-chips {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .provider-chip {
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.04);
            color: var(--text-secondary);
            transition: all var(--transition-fast);
            white-space: nowrap;
            letter-spacing: 0.2px;
        }
        .provider-chip:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
            color: #fff;
        }
        .provider-chip.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
            box-shadow: 0 2px 12px var(--accent-glow);
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .input-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-tertiary);
            letter-spacing: 0.4px;
            text-transform: uppercase;
        }
        .input-row {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 14px;
            padding: 0 14px;
            transition: all var(--transition-fast);
            position: relative;
        }
        .input-row:focus-within {
            border-color: var(--input-focus-border);
            box-shadow: 0 0 0 3px rgba(140, 150, 220, 0.08);
            background: rgba(255, 255, 255, 0.09);
        }
        .input-row input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #fff;
            font-size: 14px;
            padding: 12px 0;
            font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
            letter-spacing: 0.2px;
            min-width: 0;
        }
        .input-row input::placeholder {
            color: rgba(255, 255, 255, 0.3);
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
        }
        .input-icon-btn {
            width: 30px;
            height: 30px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.06);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;

                        </button>
                    </div>

                    <!-- 模型列表 -->
                    <div class="model-list-section" id="modelListSection">
                        <div class="model-list-header">
                            <span class="model-list-title">可用模型</span>
                            <span class="model-count" id="modelCount">0个</span>
                        </div>
                        <div id="modelListContainer">
                            <div class="empty-state">
                                <span class="empty-icon">-</span>
                                <span>请填写 API 地址并点击「拉取模型」获取列表</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="api-safe-bottom"></div>
            </div>

            <div class="toast" id="toast"></div>
        </div>
    </div>

    <script>
        (function() {
            // DOM元素
            const hoursEl = document.getElementById('hours');
            const minutesEl = document.getElementById('minutes');
            const colonEl = document.getElementById('colon');
            const timeDateEl = document.getElementById('timeDate');
            const timeGreetingEl = document.getElementById('timeGreeting');
            const statusTimeEl = document.getElementById('statusTime');
            const batteryFill = document.getElementById('batteryFill');
            const toast = document.getElementById('toast');
            const timeWidget = document.getElementById('timeWidget');
            const searchBar = document.getElementById('searchBar');
            const homeIndicator = document.getElementById('homeIndicator');
            const appItems = document.querySelectorAll('.app-item');
            const mainView = document.getElementById('mainView');
            const apiPage = document.getElementById('apiPage');
            const apiBackBtn = document.getElementById('apiBackBtn');
            const apiStatusDot = document.getElementById('apiStatusDot');
            const apiBaseUrl = document.getElementById('apiBaseUrl');
            const apiKey = document.getElementById('apiKey');
            const fetchModelsBtn = document.getElementById('fetchModelsBtn');
            const testConnBtn = document.getElementById('testConnBtn');
            const modelListContainer = document.getElementById('modelListContainer');
            const modelCount = document.getElementById('modelCount');
            const toggleKeyBtn = document.getElementById('toggleKeyBtn');
            const clearBaseUrlBtn = document.getElementById('clearBaseUrlBtn');
            const providerChips = document.getElementById('providerChips');
            const addPresetBtn = document.getElementById('addPresetBtn');
            const presetListEl = document.getElementById('presetList');

            // 状态
            let currentProvider = 'openai';
            let fetchedModels = [];
            let selectedModelId = null;
            let isApiPageOpen = false;
            let presets = [];
            let activePresetId = null;

            // Toast
            let toastTimer = null;
            function showToast(message) {
                if (toastTimer) clearTimeout(toastTimer);
                toast.textContent = message;
                toast.classList.add('show');
                toastTimer = setTimeout(() => {
                    toast.classList.remove('show');
                    toastTimer = null;
                }, 1800);
            }

            // 时间
            function getWeekday(date) {
                const days = ['日', '一', '二', '三', '四', '五', '六'];
                return '星期' + days[date.getDay()];
            }
            function getGreeting(hour) {
                if (hour >= 5 && hour < 8) return '清晨好';
                if (hour >= 8 && hour < 12) return '上午好';
                if (hour >= 12 && hour < 14) return '中午好';
                if (hour >= 14 && hour < 17) return '下午好';
                if (hour >= 17 && hour < 19) return '傍晚好';
                if (hour >= 19 && hour < 22) return '晚上好';
                return '夜深了';
            }
            function updateTime() {
                const now = new Date();
                const hours = now.getHours();
                const mins = now.getMinutes();
                const year = now.getFullYear();
                const month = now.getMonth() + 1;
                const day = now.getDate();
                hoursEl.textContent = String(hours).padStart(2, '0');
                minutesEl.textContent = String(mins).padStart(2, '0');
                timeDateEl.textContent = `${year}年${month}月${day}日 ${getWeekday(now)}`;
                timeGreetingEl.textContent = getGreeting(hours);
                statusTimeEl.textContent = String(hours).padStart(2, '0') + ':' + String(mins).padStart(2, '0');
                const batteryLevel = 65 + Math.sin(mins / 30 * Math.PI) * 20;
                batteryFill.style.width = Math.min(100, Math.max(15, batteryLevel)) + '%';
                colonEl.style.animation = 'none';
                colonEl.offsetHeight;
                colonEl.style.animation = 'colonBlink 1s step-end infinite';
            }
            updateTime();
            setInterval(updateTime, 1000);

            function createRipple(event, element) {
                const ripple = document.createElement('span');
                const rect = element.getBoundingClientRect();
                const size = Math.max(rect.width, rect.height);
                const x = event.clientX - rect.left - size / 2;
                const y = event.clientY - rect.top - size / 2;
                ripple.style.cssText = `position:absolute;width:${size}px;height:${size}px;left:${x}px;top:${y}px;background:rgba(255,255,255,0.25);border-radius:50%;pointer-events:none;transform:scale(0);animation:rippleEffect 0.6s ease-out forwards;z-index:20;`;
                const origOverflow = element.style.overflow;
                element.style.overflow = 'hidden';
                element.style.position = element.style.position || 'relative';
                element.appendChild(ripple);
                ripple.addEventListener('animationend', () => {
                    ripple.remove();
                    element.style.overflow = origOverflow;
                });
            }
            const rippleStyle = document.createElement('style');
            rippleStyle.textContent = '@keyframes rippleEffect{0%{transform:scale(0);opacity:0.7}100%{transform:scale(3.5);opacity:0}}';
            document.head.appendChild(rippleStyle);

            function updateBatteryColor() {
                const width = parseFloat(batteryFill.style.width) || 75;
                batteryFill.style.background = width < 20 ? '#ff3b30' : width < 40 ? '#ffcc00' : '#ffffff';
            }
            const batteryObserver = new MutationObserver(updateBatteryColor);
            batteryObserver.observe(batteryFill, { attributes: true, attributeFilter: ['style'] });
            updateBatteryColor();

            // 主屏幕交互
            timeWidget.addEventListener('click', function(e) {
                const now = new Date();
                showToast(`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')} 精确时间`);
                createRipple(e, this);
            });
            searchBar.addEventListener('click', function(e) {
                showToast('搜索功能已就绪');
                createRipple(e, this);
            });
            homeIndicator.addEventListener('click', function() {
                showToast('已回到主页');
                this.style.transform = 'scaleY(1.6)';
                setTimeout(() => { this.style.transform = 'scaleY(1)'; }, 200);
            });

            // API页面切换
            function openApiPage() {
                isApiPageOpen = true;
                mainView.classList.add('hidden');
                apiPage.classList.add('active');
                apiPage.scrollTop = 0;
                loadPresets();
                updateStatusDot('idle');
            }
            function closeApiPage() {
                isApiPageOpen = false;
                mainView.classList.remove('hidden');
                apiPage.classList.remove('active');
            }
            apiBackBtn.addEventListener('click', closeApiPage);

            function updateStatusDot(status) {
                apiStatusDot.className = 'api-status-dot ' + status;
                const titles = { idle: '待配置', connected: '已连接', error: '连接失败', loading: '请求中...' };
                apiStatusDot.title = titles[status] || '';
            }

            // 预设方案管理
            function loadPresets() {
                try {
                    const raw = localStorage.getItem('api_presets');
                    presets = raw ? JSON.parse(raw) : [];
                } catch (e) { presets = []; }
                if (presets.length === 0) {
                    // 默认预设
                    presets = [
                        { id: 'default_openai', name: 'OpenAI 默认', provider: 'openai', baseUrl: 'https://api.openai.com/v1', apiKey: '' }
                    ];
                    savePresets();
                }
                if (!activePresetId && presets.length > 0) {
                    activePresetId = presets[0].id;
                    applyPreset(presets[0]);
                }
                renderPresetList();
            }

            function savePresets() {
                localStorage.setItem('api_presets', JSON.stringify(presets));
            }

            function applyPreset(preset) {
                activePresetId = preset.id;
                selectProvider(preset.provider || 'openai');
                apiBaseUrl.value = preset.baseUrl || '';
                apiKey.value = preset.apiKey || '';
                currentProvider = preset.provider || 'openai';
                fetchedModels = [];
                selectedModelId = null;
                renderModelList();
                updateStatusDot('idle');
                renderPresetList();
            }

            function renderPresetList() {
                presetListEl.innerHTML = presets.map(p => `
                    <div class="preset-card${p.id === activePresetId ? ' active' : ''}" data-preset-id="${p.id}">
                        <span>${p.name}</span>
                        <button class="preset-delete-btn" data-delete="${p.id}" title="删除方案">x</button>
                    </div>
                `).join('');

                presetListEl.querySelectorAll('.preset-card').forEach(card => {
                    card.addEventListener('click', function(e) {
                        if (e.target.closest('.preset-delete-btn')) return;
                        const presetId = this.dataset.presetId;
                        const preset = presets.find(p => p.id === presetId);
                        if (preset) applyPreset(preset);
                    });
                });
                presetListEl.querySelectorAll('.preset-delete-btn').forEach(btn => {
                    btn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        const presetId = this.dataset.delete;
                        if (presets.length <= 1) {
                            showToast('至少保留一个方案');
                            return;
                        }
                        presets = presets.filter(p => p.id !== presetId);
                        savePresets();
                        if (activePresetId === presetId) {
                            activePresetId = presets[0].id;
                            applyPreset(presets[0]);
                        } else {
                            renderPresetList();
                        }
                        showToast('方案已删除');
                    });
                });
            }

            addPresetBtn.addEventListener('click', function() {
                const name = prompt('请输入方案名称：', '新方案');
                if (!name || name.trim() === '') return;
                const newPreset = {
                    id: 'preset_' + Date.now(),
                    name: name.trim(),
                    provider: currentProvider,
                    baseUrl: apiBaseUrl.value,
                    apiKey: apiKey.value,
                };
                presets.push(newPreset);
                savePresets();
                activePresetId = newPreset.id;
                renderPresetList();
                showToast('方案已保存');
            });

            // 自动保存当前激活方案
            function saveCurrentPreset() {
                if (!activePresetId) return;
                const preset = presets.find(p => p.id === activePresetId);
                if (preset) {
                    preset.provider = currentProvider;
                    preset.baseUrl = apiBaseUrl.value;
                    preset.apiKey = apiKey.value;
                    savePresets();
                }
            }

            [apiBaseUrl, apiKey].forEach(el => {
                el.addEventListener('input', function() {
                    updateStatusDot('idle');
                    saveCurrentPreset();
                });
            });

            // 提供商切换
            const providerConfigs = {
                openai: { baseUrl: 'https://api.openai.com/v1', modelsEndpoint: '/models', keyPrefix: 'sk-' },
                anthropic: { baseUrl: 'https://api.anthropic.com/v1', modelsEndpoint: '/models', keyPrefix: 'sk-ant-' },
                ollama: { baseUrl: 'http://localhost:11434', modelsEndpoint: '/api/tags', keyPrefix: '' },
                custom: { baseUrl: '', modelsEndpoint: '/models', keyPrefix: '' },
            };

            function selectProvider(provider) {
                currentProvider = provider;
                const config = providerConfigs[provider];
                apiBaseUrl.value = config.baseUrl;
                document.querySelectorAll('.provider-chip').forEach(chip => {
                    chip.classList.toggle('active', chip.dataset.provider === provider);
                });
                if (provider === 'ollama') {
                    apiKey.placeholder = 'Ollama无需密钥';
                } else {
                    apiKey.placeholder = config.keyPrefix + '...';
                }
                fetchedModels = [];
                selectedModelId = null;
                renderModelList();
                updateStatusDot('idle');
                saveCurrentPreset();
            }

            providerChips.addEventListener('click', function(e) {
                const chip = e.target.closest('.provider-chip');
                if (!chip) return;
                selectProvider(chip.dataset.provider);
            });

            toggleKeyBtn.addEventListener('click', function() {
                const isPassword = apiKey.type === 'password';
                apiKey.type = isPassword ? 'text' : 'password';
                this.innerHTML = isPassword ?
                    '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>' :
                    '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
            });

            clearBaseUrlBtn.addEventListener('click', function() {
                apiBaseUrl.value = '';
                apiBaseUrl.focus();
                saveCurrentPreset();
            });

            // 拉取模型 (仅真实API)
            async function fetchModels() {
                const baseUrl = apiBaseUrl.value.trim();
                const key = apiKey.value.trim();
                if (!baseUrl) {
                    showToast('请先填写 Base URL');
                    return;
                }
                updateStatusDot('loading');
                fetchModelsBtn.disabled = true;
                testConnBtn.disabled = true;
                const originalText = fetchModelsBtn.innerHTML;
                fetchModelsBtn.innerHTML = '<span class="spinner"></span> 拉取中...';

                let models = null;
                let success = false;
                try {
                    const config = providerConfigs[currentProvider];
                    let endpoint;
                    if (currentProvider === 'ollama') {
                        endpoint = baseUrl.replace(/\/+$/, '') + '/api/tags';
                    } else {
                        endpoint = baseUrl.replace(/\/+$/, '') + '/models';
                    }
                    const headers = {};
                    if (key && currentProvider !== 'ollama') {
                        headers['Authorization'] = 'Bearer ' + key;
                    }
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 8000);
                    const response = await fetch(endpoint, { method: 'GET', headers, signal: controller.signal });
                    clearTimeout(timeoutId);
                    if (response.ok) {
                        const data = await response.json();
                        if (currentProvider === 'ollama') {
                            models = (data.models || []).map(m => ({ id: m.name, name: m.name.replace(/:latest$/, '') }));
                        } else {
                            const list = data.data || data.models || [];
                            models = list.map(m => ({ id: m.id, name: m.id }));
                        }
                        success = true;
                    } else {
                        throw new Error(`HTTP ${response.status}`);
                    }
                } catch (err) {
                    console.error('拉取模型失败:', err.message);
                }

                fetchModelsBtn.disabled = false;
                testConnBtn.disabled = false;
                fetchModelsBtn.innerHTML = originalText;

                if (success && models && models.length > 0) {
                    fetchedModels = models;
                    if (!selectedModelId) selectedModelId = fetchedModels[0].id;
                    renderModelList();
                    updateStatusDot('connected');
                    showToast(`获取成功，共 ${fetchedModels.length} 个模型`);
                } else {
                    fetchedModels = [];
                    renderModelList();
                    updateStatusDot('error');
                    showToast('拉取失败，请检查地址和密钥');
                }
                saveCurrentPreset();
            }

            function renderModelList() {
                modelCount.textContent = fetchedModels.length + '个';
                if (fetchedModels.length === 0) {
                    modelListContainer.innerHTML = `<div class="empty-state"><span class="empty-icon">-</span><span>请填写 API 地址并点击「拉取模型」获取列表</span></div>`;
                    return;
                }
                modelListContainer.innerHTML = fetchedModels.map(m => {
                    const isSelected = m.id === selectedModelId;
                    return `
                        <div class="model-card${isSelected ? ' selected' : ''}" data-model-id="${m.id}">
                            <div class="model-icon">M</div>
                            <div class="model-info">
                                <div class="model-name">${m.name}</div>
                                <div class="model-id">${m.id}</div>
                            </div>
                            <button class="model-copy-btn" data-copy="${m.id}" title="复制模型ID">cp</button>
                        </div>`;
                }).join('');

                modelListContainer.querySelectorAll('.model-card').forEach(card => {
                    card.addEventListener('click', function(e) {
                        if (e.target.closest('.model-copy-btn')) return;
                        selectedModelId = this.dataset.modelId;
                        renderModelList();
                        showToast('已选中: ' + selectedModelId);
                    });
                });
                modelListContainer.querySelectorAll('.model-copy-btn').forEach(btn => {
                    btn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        const id = this.dataset.copy;
                        if (navigator.clipboard) {
                            navigator.clipboard.writeText(id).then(() => showToast('已复制: ' + id));
                        } else {
                            showToast('模型ID: ' + id);
                        }
                    });
                });
            }

            async function testConnection() {
                const baseUrl = apiBaseUrl.value.trim();
                if (!baseUrl) { showToast('请先填写 Base URL'); return; }
                updateStatusDot('loading');
                testConnBtn.disabled = true;
                fetchModelsBtn.disabled = true;
                const originalText = testConnBtn.innerHTML;
                testConnBtn.innerHTML = '<span class="spinner"></span> 测试中...';
                let success = false;
                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 6000);
                    const headers = {};
                    if (apiKey.value.trim() && currentProvider !== 'ollama') {
                        headers['Authorization'] = 'Bearer ' + apiKey.value.trim();
                    }
                    const resp = await fetch(baseUrl.replace(/\/+$/, '') + '/models', { headers, signal: controller.signal });
                    clearTimeout(timeoutId);
                    success = resp.ok;
                } catch (e) { /* fallback */ }
                updateStatusDot(success ? 'connected' : 'error');
                showToast(success ? '连接成功' : '连接失败，请检查地址');
                testConnBtn.disabled = false;
                fetchModelsBtn.disabled = false;
                testConnBtn.innerHTML = originalText;
            }

            fetchModelsBtn.addEventListener('click', fetchModels);
            testConnBtn.addEventListener('click', testConnection);

            // APP模块
            const appFunctions = {
                wechat: {
                    open() { showToast('打开微信 · 3条新消息'); },
                    getInfo() { return { unread: 3 }; }
                },
                api: {
                    open() { openApiPage(); },
                    getInfo() { return { models: fetchedModels.length }; }
                },
                worldbook: {
                    open() { showToast('翻开世界书 · 探索知识'); },
                    getInfo() { return { pages: 2048 }; }
                },
                beauty: {
                    open() { showToast('打开美化 · 创意工坊'); },
                    getInfo() { return { themes: 16 }; }
                },
                settings: {
                    open() { showToast('打开设置 · 系统偏好'); },
                    getInfo() { return { wifi: '已连接' }; }
                },
            };

            appItems.forEach(item => {
                const appKey = item.getAttribute('data-app');
                item.addEventListener('click', function(e) {
                    if (appKey && appFunctions[appKey]) {
                        appFunctions[appKey].open();
                    } else {
                        showToast('打开 ' + this.getAttribute('data-label'));
                    }
                    createRipple(e, this.querySelector('.app-icon-wrapper'));
                });

                let longPressTimer;
                const addLongPress = () => {
                    longPressTimer = setTimeout(() => {
                        const label = this.getAttribute('data-label');
                        const info = appKey && appFunctions[appKey] ? appFunctions[appKey].getInfo() : null;
                        showToast(info ? `${label} · ${JSON.stringify(info)}` : `${label} · 可拖拽编辑`);
                    }, 600);
                };
                const clearLongPress = () => clearTimeout(longPressTimer);
                item.addEventListener('touchstart', addLongPress, { passive: true });
                item.addEventListener('touchend', clearLongPress);
                item.addEventListener('touchmove', clearLongPress);
                item.addEventListener('mousedown', addLongPress);
                item.addEventListener('mouseup', clearLongPress);
                item.addEventListener('mouseleave', clearLongPress);
            });

            document.addEventListener('keydown', function(e) {
                if (isApiPageOpen) {
                    if (e.key === 'Escape') { closeApiPage(); return; }
                }
                const keyMap = { w: 'wechat', a: 'api', s: 'worldbook', d: 'beauty', e: 'settings' };
                if (keyMap[e.key] && appFunctions[keyMap[e.key]]) {
                    appFunctions[keyMap[e.key]].open();
                }
            });

            // 初始化
            loadPresets();
            renderModelList();
            console.log('手机主页面已就绪，API管理支持真实拉取与方案保存');
        })();
    </script>
</body>
</html>
